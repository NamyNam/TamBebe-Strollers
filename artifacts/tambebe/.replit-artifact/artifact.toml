kind = "web"
previewPath = "/"
title = "TamBebe"
version = "1.0.0"
id = "artifacts/tambebe"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18440

[services.development]
run = "pnpm --filter @workspace/tambebe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tambebe", "run", "build" ]
publicDir = "artifacts/tambebe/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18440"
BASE_PATH = "/"
